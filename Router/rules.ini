[custom]
; ================= DNS 增强配置 (全 HTTPS IP 模式) =================
; 使用 IP 格式 DoH 彻底解决 DNS 污染和“域名解析域名”的死循环
dns_config:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  ; 引导 DNS：用于建立最初的 HTTPS 握手
  bootstrap:
    - 223.5.5.5
    - 119.29.29.29
  ; 国内解析服务器：采用 IP 格式 DoH，免疫运营商 UDP 劫持
  nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
    - https://180.184.1.1/dns-query
  ; 境外解析服务器：使用 Google 和 Cloudflare 的 DoH
  fallback:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  ; 核心：强制国外 DNS 请求走代理，防止被国内防火墙阻断或干扰
  proxy-server-nameserver:
    - https://8.8.8.8/dns-query
  ; 过滤非中国 IP，确保分流准确性
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcount: 2

; ================= 分流规则 (Ruleset) =================
; 1. 强制 DNS 服务器 IP 归位（防止 DNS 请求跑错路）
ruleset=🎯 全球直连,[]IP-CIDR,223.5.5.5/32,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,119.29.29.29/32,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,1.12.12.12/32,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,180.184.1.1/32,no-resolve
ruleset=🧱 节点选择,[]IP-CIDR,8.8.8.8/32,no-resolve
ruleset=🧱 节点选择,[]IP-CIDR,1.1.1.1/32,no-resolve

; 2. WebRTC 补丁（防止浏览器泄露真实 IP 导致 Netflix 报错）
ruleset=⛔ 广告拦截,[]DOMAIN-KEYWORD,stun,no-resolve
ruleset=⛔ 广告拦截,[]DOMAIN-KEYWORD,turn,no-resolve

