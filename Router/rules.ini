ruleset=🎯 全球直连,[]IP-CIDR,223.5.5.5/32,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,119.29.29.29/32,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,1.12.12.12/32,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,180.184.1.1/32,no-resolve
ruleset=📺 奈飞视频,[]IP-CIDR,8.8.8.8/32,no-resolve
ruleset=📺 奈飞视频,[]IP-CIDR,1.1.1.1/32,no-resolve

